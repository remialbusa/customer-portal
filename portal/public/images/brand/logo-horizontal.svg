<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 130" role="img" aria-label="BioTechnical Solutions Inc. — Providing Services Beyond Expectations">
  <title>BioTechnical Solutions Inc.</title>

  <!--
    Logo composition (matches the attached reference):
      1. Green ring on the left with a clean white checkmark inside.
      2. Clean navy serif wordmark: "BioTechnical Solutions Inc."
      3. Italic green tagline: "Providing Services Beyond Expectations"
      4. A subtle green EKG/heartbeat line under the wordmark.
  -->

  <!-- 1. Green circle ring with white checkmark -->
  <g transform="translate(45, 65)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#2E9B3F" stroke-width="6"/>
    <!-- Checkmark inside the circle -->
    <path d="M -18 2 L -4 16 L 20 -12"
          fill="none"
          stroke="#2E9B3F"
          stroke-width="6"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- 2. Wordmark -->
  <text x="110" y="58"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="34"
        font-weight="700"
        fill="#1E3A8A"
        letter-spacing="0.5">BioTechnical Solutions Inc.</text>

  <!-- 3. Tagline -->
  <text x="110" y="92"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="15"
        font-style="italic"
        fill="#2E9B3F">Providing Services Beyond Expectations</text>

  <!-- 4. Subtle EKG / heartbeat line under the wordmark -->
  <g fill="none" stroke="#2E9B3F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 110 110
             L 195 110
             L 205 100
             L 215 120
             L 225 95
             L 235 115
             L 245 110
             L 695 110"/>
  </g>
</svg>
