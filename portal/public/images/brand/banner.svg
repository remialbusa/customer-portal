<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="BioTechnical Solutions Inc. brand background">
  <title>BioTechnical Solutions Inc. brand background</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#2E9B3F" />
      <stop offset="50%" stop-color="#7FC8A9" />
      <stop offset="100%" stop-color="#3FA7E0" />
    </linearGradient>
    <radialGradient id="center" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%"  stop-color="#E8F4F8" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#E8F4F8" stop-opacity="0" />
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.6" fill="#ffffff" fill-opacity="0.18" />
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#dots)" />

  <!-- big light centre -->
  <ellipse cx="800" cy="450" rx="700" ry="500" fill="url(#center)" />

  <!-- swooshes (echo of the MC monogram) -->
  <g fill="none" stroke="#1E5BD6" stroke-opacity="0.55" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 120 700 L 220 250" />
    <path d="M 220 250 L 320 700" />
    <path d="M 150 470 L 360 470" />
  </g>

  <g fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 100 200 C 500 60, 1100 60, 1500 360" />
  </g>

  <!-- EKG waveform bottom -->
  <g fill="none" stroke="#2E9B3F" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <path d="M 0 760 L 250 760 L 320 660 L 390 850 L 460 580 L 530 770 L 600 760 L 900 760 L 970 680 L 1040 840 L 1110 600 L 1180 790 L 1250 760 L 1600 760" />
  </g>

  <!-- Faint scientific motifs: beaker + DNA helix -->
  <g stroke="#ffffff" stroke-opacity="0.18" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- DNA helix (right) -->
    <path d="M 1280 180 C 1340 240, 1220 300, 1280 360 C 1340 420, 1220 480, 1280 540" />
    <path d="M 1380 180 C 1320 240, 1440 300, 1380 360 C 1320 420, 1440 480, 1380 540" />
    <line x1="1280" y1="220" x2="1380" y2="220" />
    <line x1="1240" y1="300" x2="1420" y2="300" />
    <line x1="1280" y1="380" x2="1380" y2="380" />
    <line x1="1240" y1="460" x2="1420" y2="460" />

    <!-- Beaker (left) -->
    <path d="M 220 700 L 220 760 C 220 800, 240 820, 280 820 L 360 820 C 400 820, 420 800, 420 760 L 420 700" />
    <line x1="200" y1="700" x2="440" y2="700" />
    <path d="M 235 760 L 405 760" />
    <!-- liquid ticks -->
    <line x1="260" y1="730" x2="280" y2="730" />
    <line x1="260" y1="745" x2="280" y2="745" />
    <line x1="360" y1="730" x2="380" y2="730" />
    <line x1="360" y1="745" x2="380" y2="745" />
  </g>

  <!-- Circuit board (bottom right) -->
  <g stroke="#ffffff" stroke-opacity="0.22" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 1100 820 L 1300 820" />
    <path d="M 1300 820 L 1300 760" />
    <path d="M 1300 760 L 1450 760" />
    <path d="M 1450 760 L 1450 820" />
    <path d="M 1450 820 L 1600 820" />
    <path d="M 1200 820 L 1200 860" />
    <path d="M 1400 820 L 1400 860" />
    <path d="M 1500 820 L 1500 860" />
    <circle cx="1300" cy="820" r="5" fill="#ffffff" fill-opacity="0.4" />
    <circle cx="1450" cy="820" r="5" fill="#ffffff" fill-opacity="0.4" />
  </g>
</svg>
